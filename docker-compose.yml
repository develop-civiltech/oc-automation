services:
  app:
    build: .
    image: oc-automation:latest
    container_name: oc-automation-app
    env_file: .env
    environment:
      - TZ=America/Bogota
    volumes:
      - ./data:/app/data
    expose:
      - "3001"
    networks:
      - edge
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3001/"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  mailer:
    build: .
    image: oc-automation:latest
    command: ["supercronic", "/app/deploy/crontab"]
    env_file: .env
    environment:
      - TZ=America/Bogota
    volumes:
      - ./data:/app/data
      - ./deploy/crontab:/app/deploy/crontab:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  edge:
    external: true
