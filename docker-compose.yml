services:
  app:
    build: .
    image: oc-automation:latest
    env_file: .env
    environment:
      - TZ=America/Bogota
    volumes:
      - ./data:/app/data
    expose:
      - "3001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3001/me"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  mailer:
    build: .
    image: oc-automation:latest
    command: ["supercronic", "/app/deploy/crontab"]
    env_file: .env
    environment:
      - TZ=America/Bogota
    volumes:
      - ./data:/app/data
      - ./deploy/crontab:/app/deploy/crontab:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
