<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Categorizar Insumos</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0; padding: 0; background: #f6f7f9; color: #1a1a1a;
    }
    header {
      background: #1e293b; color: white; padding: 1rem 2rem;
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 20;
    }
    header h1 { font-size: 1.1rem; margin: 0; font-weight: 600; }
    main { padding: 1rem 2rem; max-width: 1600px; margin: 0 auto; }
    .toolbar {
      display: flex; gap: .75rem; align-items: center; flex-wrap: wrap;
      background: white; padding: 1rem; border-radius: 8px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 1rem;
    }
    .toolbar input, .toolbar select, .toolbar button {
      padding: .5rem .75rem; border: 1px solid #d1d5db; border-radius: 6px;
      font-size: .9rem; background: white;
    }
    .toolbar button {
      background: #2563eb; color: white; border-color: #2563eb;
      cursor: pointer; font-weight: 500;
    }
    .toolbar button:hover { background: #1d4ed8; }
    .toolbar button.secundario { background: #f3f4f6; color: #1a1a1a; border-color: #d1d5db; }
    .toolbar button.secundario:hover { background: #e5e7eb; }
    .toolbar button.peligro { background: #dc2626; border-color: #dc2626; }
    .toolbar .spacer { flex: 1; }
    .stats {
      display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1rem;
    }
    .badge {
      padding: .35rem .7rem; background: white; border-radius: 999px;
      border: 1px solid #e5e7eb; font-size: .85rem; font-weight: 500;
      cursor: pointer; user-select: none;
    }
    .badge.activo { background: #1e293b; color: white; border-color: #1e293b; }
    .badge .count { opacity: .7; margin-left: .35rem; font-weight: 400; }
    .badge.sin-cat { border-color: #dc2626; color: #dc2626; }
    .badge.sin-cat.activo { background: #dc2626; color: white; }
    .badge.custom { border-style: dashed; }
    .badge .del {
      margin-left: .4rem; opacity: .55; font-weight: 600;
      padding: 0 .25rem; border-radius: 4px; cursor: pointer;
    }
    .badge .del:hover { background: rgba(220,38,38,.15); opacity: 1; color: #dc2626; }

    table { width: 100%; border-collapse: collapse; background: white;
            border-radius: 8px; overflow: hidden;
            box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    thead { background: #f9fafb; position: sticky; top: 72px; z-index: 10; }
    th, td { padding: .5rem .75rem; text-align: left; border-bottom: 1px solid #e5e7eb; font-size: .9rem; }
    th { font-weight: 600; color: #374151; font-size: .8rem; text-transform: uppercase; letter-spacing: .03em; }
    tr.seleccionada { background: #eff6ff; }
    tr.sin-categoria td.cat-cell { background: #fef2f2; }
    td input, td select {
      border: 1px solid transparent; padding: .3rem .5rem; width: 100%;
      background: transparent; border-radius: 4px; font-size: .9rem;
    }
    td input:focus, td select:focus {
      border-color: #2563eb; background: white; outline: none;
    }
    td input[type=checkbox] { width: auto; }
    .ocur { color: #6b7280; font-variant-numeric: tabular-nums; }
    .vacio { padding: 3rem; text-align: center; color: #6b7280; }
    .pie {
      position: sticky; bottom: 0; background: white;
      padding: 1rem 2rem; box-shadow: 0 -1px 3px rgba(0,0,0,.08);
      display: flex; justify-content: space-between; align-items: center;
    }
    .bulk {
      display: flex; gap: .5rem; align-items: center;
      background: #fef3c7; padding: .5rem 1rem; border-radius: 6px;
      border: 1px solid #fde68a;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <header>
    <h1>📋 Categorizar Insumos</h1>
    <div>
      <input type="file" id="fileInput" accept=".json" class="hidden">
      <button onclick="document.getElementById('fileInput').click()" class="secundario">📂 Cargar JSON</button>
      <button id="btnDescargar" onclick="descargar()">💾 Descargar validados</button>
    </div>
  </header>

  <main>
    <div class="vacio" id="vacio">
      Carga <code>data/insumos_sugeridos.json</code> para empezar.<br><br>
      <small>Generado por <code>node src/scripts/extraer-insumos.js</code></small>
    </div>

    <div id="contenido" class="hidden">
      <div class="toolbar">
        <input type="search" id="buscar" placeholder="Buscar..." style="flex: 1; min-width: 240px">
        <select id="ordenar">
          <option value="ocurrencias">Más usados primero</option>
          <option value="alfabetico">Alfabético</option>
          <option value="sin-cat">Sin categoría primero</option>
        </select>
        <button class="secundario" onclick="agregarCategoriaManual()" title="Agregar una categoría personalizada">+ Agregar categoría</button>
        <span class="spacer"></span>
        <span id="resumen" style="color:#6b7280; font-size:.9rem"></span>
      </div>

      <div class="stats" id="stats"></div>

      <div class="bulk hidden" id="bulkBar">
        <strong><span id="bulkCount">0</span> seleccionados</strong>
        <select id="bulkCategoria">
          <option value="">— Cambiar categoría —</option>
        </select>
        <button onclick="aplicarBulkCategoria()">Aplicar</button>
        <button onclick="limpiarSeleccion()" class="secundario">Cancelar</button>
      </div>

      <table>
        <thead>
          <tr>
            <th style="width:32px"><input type="checkbox" id="chkAll" onchange="toggleAll(this.checked)"></th>
            <th style="width:50px">#</th>
            <th>Nombre</th>
            <th style="width:160px" class="cat-cell">Categoría</th>
            <th style="width:140px">Subcategoría</th>
            <th style="width:90px">Unidad</th>
            <th style="width:60px" class="ocur">Ocurr.</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </main>

  <script>
    const CATEGORIAS_BASE = [
      'HERRAMIENTA', 'EPP', 'DOTACIÓN', 'EPCC', 'CAMPAMENTO',
      'MATERIALES', 'COMBUSTIBLE', 'MANTENIMIENTOS', 'EQUIPOS Y CALIDAD',
    ];

    // Subcategorías sugeridas por categoría (el usuario puede escribir cualquier cosa)
    const SUB_SUGERIDAS = {
      'HERRAMIENTA':        ['Manual', 'Eléctrica', 'Medición', 'Corte', 'Perforación', 'Topografía'],
      'EPP':                ['Cabeza', 'Ojos', 'Oídos', 'Respiratoria', 'Manos', 'Pies', 'Cuerpo'],
      'DOTACIÓN':           ['Ropa', 'Calzado', 'Accesorios'],
      'EPCC':               ['Arneses', 'Eslingas', 'Anclajes', 'Conectores', 'Rescate'],
      'CAMPAMENTO':         ['Mobiliario', 'Aseo', 'Oficina', 'Señalización', 'Hidratación'],
      'MATERIALES':         ['Concreto', 'Acero', 'Plomería', 'Eléctricos', 'Adhesivos', 'Pintura', 'Anclajes'],
      'COMBUSTIBLE':        ['Gasolina', 'Diesel', 'Lubricante', 'Grasa'],
      'MANTENIMIENTOS':     ['Filtros', 'Repuestos', 'Servicios', 'Llantas'],
      'EQUIPOS Y CALIDAD':  ['Equipo de medición', 'Equipo de ensayo', 'Calibración', 'Certificación', 'Laboratorio', 'Inspección'],
    };

    // Categorías personalizadas del usuario (persistidas en localStorage)
    const LS_KEY_CATS_CUSTOM = 'civiltech.categorias.custom';
    function cargarCategoriasCustom() {
      try { return JSON.parse(localStorage.getItem(LS_KEY_CATS_CUSTOM) || '[]'); }
      catch { return []; }
    }
    function guardarCategoriasCustom(xs) {
      localStorage.setItem(LS_KEY_CATS_CUSTOM, JSON.stringify(xs));
    }

    let CATEGORIAS = [...CATEGORIAS_BASE, ...cargarCategoriasCustom()];

    function agregarCategoriaManual() {
      const raw = prompt('Nombre de la nueva categoría:\n(se normaliza a MAYÚSCULAS)');
      if (!raw) return;
      const nueva = raw.trim().toUpperCase();
      if (!nueva) return;
      if (CATEGORIAS.includes(nueva)) {
        alert(`La categoría "${nueva}" ya existe.`);
        return;
      }
      const custom = cargarCategoriasCustom();
      custom.push(nueva);
      guardarCategoriasCustom(custom);
      CATEGORIAS = [...CATEGORIAS_BASE, ...custom];
      // Rellenar bulk y re-render
      poblarBulkCategorias();
      render();
    }

    function eliminarCategoriaCustom(nombre) {
      if (CATEGORIAS_BASE.includes(nombre)) {
        alert(`"${nombre}" es una categoría base y no se puede eliminar.`);
        return;
      }
      if (!confirm(`¿Eliminar la categoría personalizada "${nombre}"?\nLos insumos que la usen quedarán sin categoría.`)) return;
      const custom = cargarCategoriasCustom().filter(c => c !== nombre);
      guardarCategoriasCustom(custom);
      CATEGORIAS = [...CATEGORIAS_BASE, ...custom];
      // Insumos que usaban esta categoría → sin categoría
      for (const it of insumos) {
        if (it.categoria === nombre) it.categoria = '_SIN_CATEGORIA';
      }
      poblarBulkCategorias();
      render();
    }

    let insumos = [];
    let filtroCategoria = null;
    let seleccionados = new Set();

    // ── Carga desde archivo ─────────────────────────────────────────────────
    document.getElementById('fileInput').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const text = await file.text();
      insumos = JSON.parse(text).map((it, i) => ({ ...it, _id: i }));
      document.getElementById('vacio').classList.add('hidden');
      document.getElementById('contenido').classList.remove('hidden');
      poblarBulkCategorias();
      render();
    });

    function poblarBulkCategorias() {
      const sel = document.getElementById('bulkCategoria');
      sel.innerHTML = '<option value="">— Cambiar categoría —</option>';
      CATEGORIAS.forEach(c => {
        const o = document.createElement('option');
        o.value = c; o.textContent = c;
        sel.appendChild(o);
      });
    }

    // ── Render ──────────────────────────────────────────────────────────────
    function render() {
      renderStats();
      renderTabla();
      renderResumen();
    }

    function renderStats() {
      const stats = { '_TODOS': insumos.length, '_SIN_CATEGORIA': 0 };
      CATEGORIAS.forEach(c => stats[c] = 0);
      for (const it of insumos) {
        stats[it.categoria] = (stats[it.categoria] || 0) + 1;
      }

      const ctn = document.getElementById('stats');
      ctn.innerHTML = '';
      const addBadge = (key, label, extraClass = '', borrable = false) => {
        const b = document.createElement('div');
        b.className = 'badge ' + extraClass;
        if (filtroCategoria === key || (key === '_TODOS' && filtroCategoria === null)) {
          b.classList.add('activo');
        }
        let html = `${label}<span class="count">${stats[key] || 0}</span>`;
        if (borrable) html += `<span class="del" title="Eliminar esta categoría personalizada">×</span>`;
        b.innerHTML = html;
        b.onclick = (e) => {
          if (e.target.classList.contains('del')) {
            e.stopPropagation();
            eliminarCategoriaCustom(key);
            return;
          }
          filtroCategoria = key === '_TODOS' ? null : key;
          render();
        };
        ctn.appendChild(b);
      };
      addBadge('_TODOS', 'Todos');
      addBadge('_SIN_CATEGORIA', 'Sin categoría', 'sin-cat');
      const custom = cargarCategoriasCustom();
      CATEGORIAS.forEach(c => {
        const esCustom = custom.includes(c);
        addBadge(c, c, esCustom ? 'custom' : '', esCustom);
      });
    }

    function filtrados() {
      const q = (document.getElementById('buscar').value || '').toUpperCase();
      let xs = insumos;
      if (filtroCategoria) xs = xs.filter(it => it.categoria === filtroCategoria);
      if (q) xs = xs.filter(it =>
        (it.nombre || '').toUpperCase().includes(q) ||
        (it.nombreNormalizado || '').toUpperCase().includes(q)
      );
      const orden = document.getElementById('ordenar').value;
      if (orden === 'alfabetico') {
        xs.sort((a, b) => (a.nombre || '').localeCompare(b.nombre || ''));
      } else if (orden === 'sin-cat') {
        xs.sort((a, b) => {
          const aSc = a.categoria === '_SIN_CATEGORIA' ? 0 : 1;
          const bSc = b.categoria === '_SIN_CATEGORIA' ? 0 : 1;
          if (aSc !== bSc) return aSc - bSc;
          return (b._meta?.ocurrencias || 0) - (a._meta?.ocurrencias || 0);
        });
      } else {
        xs.sort((a, b) => (b._meta?.ocurrencias || 0) - (a._meta?.ocurrencias || 0));
      }
      return xs;
    }

    function renderTabla() {
      const xs = filtrados();
      const tb = document.getElementById('tbody');
      tb.innerHTML = '';

      if (xs.length === 0) {
        tb.innerHTML = '<tr><td colspan="7" class="vacio">Sin resultados</td></tr>';
        return;
      }

      // Render en chunks para no bloquear UI con 800+ items
      let i = 0;
      const renderChunk = () => {
        const end = Math.min(i + 100, xs.length);
        const frag = document.createDocumentFragment();
        for (; i < end; i++) {
          frag.appendChild(filaHTML(xs[i], i));
        }
        tb.appendChild(frag);
        if (i < xs.length) requestAnimationFrame(renderChunk);
      };
      renderChunk();
    }

    function filaHTML(it, idx) {
      const tr = document.createElement('tr');
      if (it.categoria === '_SIN_CATEGORIA') tr.classList.add('sin-categoria');
      if (seleccionados.has(it._id)) tr.classList.add('seleccionada');

      const chk = `<td><input type="checkbox" ${seleccionados.has(it._id) ? 'checked' : ''} onchange="toggleSel(${it._id}, this.checked)"></td>`;
      const pos = `<td class="ocur">${idx + 1}</td>`;
      const nom = `<td><input value="${(it.nombre || '').replace(/"/g,'&quot;')}" onchange="cambiar(${it._id}, 'nombre', this.value)"></td>`;

      const opcionesCat = ['_SIN_CATEGORIA', ...CATEGORIAS].map(c =>
        `<option value="${c}" ${c === it.categoria ? 'selected' : ''}>${c === '_SIN_CATEGORIA' ? '— sin categoría —' : c}</option>`
      ).join('');
      const cat = `<td class="cat-cell"><select onchange="cambiar(${it._id}, 'categoria', this.value); render();">${opcionesCat}</select></td>`;

      const subs = (SUB_SUGERIDAS[it.categoria] || []).map(s =>
        `<option value="${s}" ${s === it.subcategoria ? 'selected' : ''}>${s}</option>`
      ).join('');
      const sub = `<td><input list="subs_${it._id}" value="${(it.subcategoria || '').replace(/"/g,'&quot;')}" onchange="cambiar(${it._id}, 'subcategoria', this.value)">
        <datalist id="subs_${it._id}">${subs}</datalist></td>`;

      const und = `<td><input value="${it.unidadEstandar || ''}" onchange="cambiar(${it._id}, 'unidadEstandar', this.value)"></td>`;
      const ocur = `<td class="ocur">${it._meta?.ocurrencias || 0}</td>`;

      tr.innerHTML = chk + pos + nom + cat + sub + und + ocur;
      return tr;
    }

    function cambiar(id, campo, valor) {
      const it = insumos.find(x => x._id === id);
      if (it) it[campo] = valor;
    }

    function toggleSel(id, on) {
      if (on) seleccionados.add(id); else seleccionados.delete(id);
      renderBulk();
    }
    function toggleAll(on) {
      if (on) filtrados().forEach(it => seleccionados.add(it._id));
      else    filtrados().forEach(it => seleccionados.delete(it._id));
      renderBulk();
      renderTabla();
    }
    function limpiarSeleccion() {
      seleccionados.clear();
      document.getElementById('chkAll').checked = false;
      renderBulk();
      renderTabla();
    }
    function aplicarBulkCategoria() {
      const cat = document.getElementById('bulkCategoria').value;
      if (!cat) return alert('Elige una categoría');
      for (const id of seleccionados) {
        const it = insumos.find(x => x._id === id);
        if (it) it.categoria = cat;
      }
      limpiarSeleccion();
      render();
    }
    function renderBulk() {
      const bar = document.getElementById('bulkBar');
      document.getElementById('bulkCount').textContent = seleccionados.size;
      if (seleccionados.size > 0) bar.classList.remove('hidden');
      else bar.classList.add('hidden');
    }
    function renderResumen() {
      const sinCat = insumos.filter(i => i.categoria === '_SIN_CATEGORIA').length;
      const mostrando = filtrados().length;
      document.getElementById('resumen').textContent =
        `${mostrando} mostrados  ·  ${insumos.length} total  ·  ${sinCat} sin categoría`;
    }

    function descargar() {
      if (!insumos.length) return alert('No hay datos cargados');
      const sinCat = insumos.filter(i => i.categoria === '_SIN_CATEGORIA').length;
      if (sinCat > 0) {
        if (!confirm(`Aún quedan ${sinCat} insumos sin categoría. ¿Descargar igual?`)) return;
      }
      // Limpiar _id y dejar _meta si existe
      const salida = insumos.map(({ _id, ...rest }) => rest);
      const blob = new Blob([JSON.stringify(salida, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'insumos_validados.json';
      a.click();
    }

    document.getElementById('buscar').addEventListener('input', () => { render(); });
    document.getElementById('ordenar').addEventListener('change', () => { render(); });
  </script>
</body>
</html>
